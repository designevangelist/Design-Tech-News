name: Fetch Content (Jobs & News)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch jobs from Remotive
        run: node scripts/fetch-jobs.mjs

      - name: Fetch news from RSS feeds
        run: node scripts/fetch-news.mjs

      - name: Commit and push new content
        run: |
          git config --global user.name "DesignTechNews Bot"
          git config --global user.email "bot@designtechnews.com"
          git add src/content/jobs/ src/content/news/
          git diff --staged --quiet || git commit -m "🤖 Auto-fetch: new jobs and news"
          git push